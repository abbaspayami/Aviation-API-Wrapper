global:
  scrape_interval: 15s   # pull metrics from every target every 15 seconds

scrape_configs:

  - job_name: aviation-api-wrapper
    metrics_path: /actuator/prometheus   # Spring Boot Actuator + Micrometer endpoint
    static_configs:
      - targets:
          - aviation-api-wrapper-1:8080  # instance 1 (internal Docker network)
          - aviation-api-wrapper-2:8080  # instance 2 (internal Docker network)
        labels:
          application: aviation-api-wrapper   # appears as a label on every metric in Grafana
