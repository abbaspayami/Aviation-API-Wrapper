# =============================================================================
# Secret — aviation-secret
# =============================================================================
# Holds SENSITIVE values.  Kubernetes stores these base64-encoded
# (not encrypted by default — enable EncryptionConfiguration in production).
#
# stringData lets you write plain text here; Kubernetes base64-encodes it
# automatically when saving.
#
# ⚠️  NEVER commit real keys to git.
#     Replace the placeholder values below using one of these approaches:
#
#   Option A — kubectl patch (one-off):
#     kubectl create secret generic aviation-secret \
#       --from-literal=SECURITY_API_KEYS="key1,key2" \
#       --from-literal=AVIATION_PROVIDER2_API_TOKEN="your-token" \
#       -n aviation --dry-run=client -o yaml | kubectl apply -f -
#
#   Option B — CI/CD (recommended):
#     Store real values as CI secrets and inject them at deploy time.
#     Never let them touch the repository.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aviation-secret
  namespace: aviation
  labels:
    app.kubernetes.io/part-of: aviation-api-wrapper
type: Opaque
stringData:
  # Comma-separated list of valid API keys for the X-API-Key header.
  # Replace with real keys before deploying to any non-local environment.
  SECURITY_API_KEYS: "sporty-dev-key-abc123,sporty-dev-key-xyz789"

  # AirportDB.io token — leave empty if not using Provider 2.
  # Register for a free token at https://airportdb.io
  AVIATION_PROVIDER2_API_TOKEN: ""
