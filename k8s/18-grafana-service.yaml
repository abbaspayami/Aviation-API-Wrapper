# =============================================================================
# Grafana — Service (LoadBalancer)
# =============================================================================
# Exposes the Grafana UI externally on port 3000.
# Access at http://<external-ip>:3000  (admin / admin)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: aviation-grafana
  namespace: aviation
  labels:
    app: aviation-grafana
    app.kubernetes.io/part-of: aviation-api-wrapper
spec:
  type: LoadBalancer
  selector:
    app: aviation-grafana
  ports:
    - port: 3000
      targetPort: 3000
