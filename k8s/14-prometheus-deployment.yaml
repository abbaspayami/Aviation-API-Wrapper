# =============================================================================
# Prometheus — Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aviation-prometheus
  namespace: aviation
  labels:
    app: aviation-prometheus
    app.kubernetes.io/part-of: aviation-api-wrapper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aviation-prometheus
  template:
    metadata:
      labels:
        app: aviation-prometheus
    spec:
      # Use the ServiceAccount that has permission to read pod metadata.
      serviceAccountName: aviation-prometheus

      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"   # keep 7 days of metrics
          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-storage
              mountPath: /prometheus

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

      volumes:
        - name: prometheus-config
          configMap:
            name: aviation-prometheus-config
        # emptyDir — metrics are lost on pod restart.
        # For production, replace with a PersistentVolumeClaim.
        - name: prometheus-storage
          emptyDir: {}
