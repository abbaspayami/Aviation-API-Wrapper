# =============================================================================
# Nginx — load balancer configuration
# =============================================================================
# Distributes incoming traffic across two Aviation API Wrapper instances.
# Default algorithm: round-robin (request 1 → instance-1, request 2 → instance-2).
#
# Passive health checking:
#   max_fails=3      — mark a server as down after 3 consecutive failures
#   fail_timeout=30s — keep it marked as down for 30 seconds before retrying
#
# When one instance goes down Nginx automatically stops sending traffic to it
# and routes all requests to the remaining healthy instance — zero downtime.
# =============================================================================

events {
    worker_connections 1024;
}

http {

    # ── Upstream pool ─────────────────────────────────────────────────────────
    upstream aviation_cluster {
        server aviation-api-wrapper-1:8080 max_fails=3 fail_timeout=30s;
        server aviation-api-wrapper-2:8080 max_fails=3 fail_timeout=30s;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;

        location / {
            proxy_pass         http://aviation_cluster;

            # Forward the real client IP so the app sees it in logs and filters,
            # not Nginx's internal container IP (e.g. 172.18.0.3).
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts — allow for the app's full retry chain:
            # 3 attempts × (3s connect + 10s read + 4s backoff) ≈ 51s worst case.
            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
        }
    }
}
